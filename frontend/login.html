<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Barber Registro</title>
    <!-- Estilos: global + específico de esta página -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Skip link: accesibilidad para navegación con teclado (C7) -->
    <a href="#email" class="skip-link">Saltar al formulario</a>

    <!-- Decoración de fondo: círculos difuminados dorados en las esquinas -->
    <div class="bg-deco"><span></span><span></span></div>

    <!-- Contenedor principal centrado verticalmente -->
    <div class="login-wrap">

        <!-- Encabezado: logo de tijeras + nombre de la app -->
        <div class="login-brand">
            <div class="scissors"><i class="fas fa-cut"></i></div>
            <h1>Barber <span>Registro</span></h1>
            <p>Panel de administración</p>
        </div>

        <!-- Card del formulario de login -->
        <div class="login-card">
            <!-- Contenedor de mensajes de error/éxito -->
            <div id="mensaje" role="alert"></div>

            <!-- Campo de email -->
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="tu@email.com" autofocus>
            </div>

            <!-- Campo de contraseña con botón para mostrar/ocultar -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="pw-wrap">
                    <input type="password" id="password" class="form-control" placeholder="Tu contraseña">
                    <button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Mostrar contraseña">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Botón de submit -->
            <button id="btnLogin" onclick="login()" class="btn btn-primary login-submit">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>

            <!-- Separador visual -->
            <div class="divider">o</div>

            <!-- Link al registro para nuevos usuarios -->
            <p class="login-register-hint">
                ¿No tienes cuenta? <a href="index.html" class="login-register-link">Registra tu barbería</a>
            </p>
        </div>

        <!-- Footer discreto -->
        <div class="login-footer">
            Sistema de reservas · Barber Registro
        </div>
    </div>

    <!-- ══ LÓGICA DE LOGIN ══════════════════════════════════════
         - Si ya tiene sesión activa, redirige al panel
         - Enter en email → foco al password
         - Enter en password → ejecuta login
         - Login envía POST a /auth/login y guarda token JWT
         ═══════════════════════════════════════════════════════ -->
    <script type="module">
        import { config, auth } from './assets/js/config.js';

        // Si ya tiene sesión como dueño, redirigir directo al panel
        if (auth.estaLogueado() && auth.getRole() === 'dueno') window.location.href = 'usuario.html';

        // Atajos de teclado: Enter para navegar entre campos
        document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') window.login(); });
        document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });

        // Función de login: envía credenciales al backend
        window.login = async function() {
            const email = document.getElementById('email').value.trim();
            const pw = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const msg = document.getElementById('mensaje');

            // Evitar una petición al backend con campos vacíos que siempre fallaría
            if (!email || !pw) { msg.innerHTML='<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Completa todos los campos</div>'; return; }

            btn.disabled=true; btn.innerHTML='<span class="loading"></span> Entrando...'; msg.innerHTML='';
            try {
                const r = await fetch(`${config.apiURL}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password:pw}) });
                const d = await r.json();
                if (!r.ok) throw new Error(d.error||'Error');

                // Guardar sesión y redirigir al panel
                auth.guardarSesion(d.token, d.barberia, 'dueno');
                window.location.href = 'usuario.html';
            } catch(e) { msg.innerHTML=`<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ${e.message}</div>`; }
            finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Iniciar Sesión'; }
        };

        // Toggle mostrar/ocultar contraseña
        window.togglePw = function() {
            const i=document.getElementById('password'), ic=document.getElementById('eyeIcon');
            i.type = i.type==='password' ? 'text' : 'password';
            ic.className = i.type==='password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        };
    </script>
</body>
</html>
